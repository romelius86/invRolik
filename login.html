<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Iniciar Sesión | ROLIK ERP</title>
    <link rel="icon" href="data:;base64,iVBORw0KGgo=">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        :root {
            --sidebar-bg: #1e293b;
            --accent-color: #3b82f6;
            --bg-dark: #0f172a;
            --text-main: #f1f5f9;
            --text-muted: #94a3b8;
            --border-color: #334155;
        }

        body {
            font-family: 'Inter', sans-serif;
            background-color: var(--bg-dark);
            margin: 0;
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            color: var(--text-main);
        }

        .login-card {
            background: var(--sidebar-bg);
            padding: 50px;
            border-radius: 16px;
            box-shadow: 0 10px 25px rgba(0,0,0,0.3);
            width: 100%;
            max-width: 420px;
            text-align: center;
            border: 1px solid var(--border-color);
        }

        .logo {
            font-size: 36px;
            font-weight: 800;
            margin-bottom: 40px;
            letter-spacing: 1px;
        }

        .logo span { color: var(--accent-color); }

        .input-group {
            margin-bottom: 25px;
            text-align: left;
        }

        .input-group label {
            display: block;
            margin-bottom: 10px;
            color: var(--text-muted);
            font-size: 13px;
            font-weight: 600;
            text-transform: uppercase;
        }

        .input-group input {
            width: 100%;
            padding: 14px;
            background: #0f172a;
            border: 1px solid var(--border-color);
            border-radius: 8px;
            font-size: 16px;
            box-sizing: border-box;
            outline: none;
            color: white;
            transition: border-color 0.3s;
        }

        .input-group input:focus { border-color: var(--accent-color); }

        .login-btn {
            width: 100%;
            padding: 16px;
            background-color: var(--accent-color);
            color: white;
            border: none;
            border-radius: 8px;
            font-size: 16px;
            font-weight: 700;
            cursor: pointer;
            transition: all 0.3s;
            margin-top: 15px;
        }

        .login-btn:hover { background-color: #2563eb; transform: translateY(-2px); }

        #error-message {
            color: #ef4444;
            font-size: 14px;
            margin-top: 20px;
            min-height: 20px;
            background: rgba(239, 68, 68, 0.1);
            padding: 10px;
            border-radius: 6px;
            display: none;
        }
    </style>
</head>
<body>

    <div class="login-card">
        <div class="logo">ROLIK <span>ERP</span></div>
        <form id="loginForm">
            <div class="input-group">
                <label for="username">Usuario</label>
                <input type="text" id="username" required placeholder="Ingresa tu usuario">
            </div>
            <div class="input-group">
                <label for="password">Contraseña</label>
                <input type="password" id="password" required placeholder="••••••••">
            </div>
            <button type="submit" class="login-btn">INGRESAR AL SISTEMA</button>
            <div id="error-message"></div>
        </form>
    </div>

    <script>
        if (sessionStorage.getItem('user')) {
            window.location.href = 'dashboard.html';
        }

        document.getElementById('loginForm').addEventListener('submit', async (e) => {
            e.preventDefault();
            const username = document.getElementById('username').value;
            const password = document.getElementById('password').value;
            const errorDiv = document.getElementById('error-message');
            const btn = document.querySelector('.login-btn');

            btn.textContent = 'VERIFICANDO...';
            btn.disabled = true;
            errorDiv.style.display = 'none';

            try {
                const response = await fetch('https://invrolik-6.onrender.com/login', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ username, password })
                });

                const data = await response.json();

                if (response.ok) {
                    sessionStorage.setItem('user', JSON.stringify(data.user));
                    window.location.href = 'dashboard.html';
                } else {
                    errorDiv.textContent = data.detail || 'Error de credenciales';
                    errorDiv.style.display = 'block';
                }
            } catch (error) {
                errorDiv.textContent = 'No se pudo conectar con el servidor';
                errorDiv.style.display = 'block';
            } finally {
                btn.textContent = 'INGRESAR AL SISTEMA';
                btn.disabled = false;
            }
        });
    </script>
</body>
</html>
